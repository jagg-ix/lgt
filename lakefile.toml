name = "LGT"
version = "0.1.0"
keywords = ["math", "gauge-theory", "lattice"]
defaultTargets = ["LGT"]

[leanOptions]
autoImplicit = false

[[require]]
name = "GaussianField"
git = "https://github.com/mrdouglasny/gaussian-field.git"
rev = "main"

[[require]]
name = "MarkovSemigroups"
git = "https://github.com/jagg-ix/markov-semigroups.git"
rev = "2c4e1f843535ff4bc9016563515ab271abce621f"

[[require]]
name = "mathlib"
scope = "leanprover-community"
version = "git#v4.29.0"

[[lean_lib]]
name = "LGT"
